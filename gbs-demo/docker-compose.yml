# Convenience wrapper around the transaction-priorities demo image.
#
#   cd gbs-demo && docker compose up --build
#
# The RPC endpoint is then available at http://localhost:18545.
services:
  sonic-priorities:
    build:
      context: ..
      dockerfile: gbs-demo/Dockerfile
    image: sonic-priorities-demo
    # Demo configuration. Override from your shell (e.g. `DEMO_USERS=20 docker
    # compose up`) or edit the defaults here.
    environment:
      VALIDATORS: ${VALIDATORS:-5}
      DEMO_USERS: ${DEMO_USERS:-10}
      DEMO_BALANCE: ${DEMO_BALANCE:-1000000000}
    ports:
      - "18545:18545" # validator 1 HTTP RPC (primary endpoint)
      - "18546:18546" # validator 2 HTTP RPC
      - "18547:18547" # validator 3 HTTP RPC
      - "18548:18548" # validator 4 HTTP RPC
      - "18549:18549" # validator 5 HTTP RPC
      - "18645:18645" # validator 1 WebSocket RPC
    # The network is recreated fresh on every start. Uncomment to persist the
    # chain data (and thus balances/priority config) across restarts:
    # volumes:
    #   - sonic-demo-data:/data

# volumes:
#   sonic-demo-data:
